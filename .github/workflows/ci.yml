name: WordPress CI/CD

on:
  pull_request:
  push:
    branches: [main]

jobs:

  # -------------------------
  # QUALITY CHECK (PR)
  # -------------------------
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: PHP Lint
        run: |
          find . -name "*.php" -exec php -l {} \;

      - name: Install PHPCS & WPCS
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require "squizlabs/php_codesniffer:^3.7"
          composer global require "wp-coding-standards/wpcs:^3.0"

      - name: Run WordPress Coding Standards
        run: |
          ~/.composer/vendor/bin/phpcs --standard=WordPress .

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Security Scan
        run: |
          trivy fs . --severity HIGH,CRITICAL --exit-code 0

  # -------------------------
  # BUILD & DEPLOY (MAIN)
  # -------------------------
  build-deploy:
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Artifact
        run: |
          zip -r wordpress-${{ github.run_number }}.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordpress-build
          path: wordpress-*.zip

      - name: Simulate Deployment
        run: |
          echo "Deploying to WordPress platform..."
          echo "Applying new build..."
          echo "Restarting services..."
          echo "Deployment successful!"